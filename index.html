<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#111111">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎹</text></svg>">
  <title>Rakelfingers</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: #111;
      overflow: hidden;
      touch-action: none;
      overscroll-behavior: none;
      -webkit-touch-callout: none;
      user-select: none;
      -webkit-user-select: none;
    }

    #particles {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    #letters {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 2;
      overflow: hidden;
    }

    #shapes {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    #splash {
      position: fixed; inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.92);
      z-index: 10;
      cursor: pointer;
      transition: opacity 0.6s ease;
    }

    #splash-emoji {
      font-size: 15vmin;
      animation: splashPulse 2s ease-in-out infinite;
    }

    #splash-text {
      font-size: 5vmin;
      margin-top: 2vmin;
      font-family: system-ui, sans-serif;
      font-weight: 700;
      letter-spacing: 0.05em;
      background: linear-gradient(90deg,
        #ff6b6b, #ffd93d, #6bcb77, #4d96ff,
        #ff6bb5, #ff9f43, #a29bfe, #ff6b6b);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: rainbowShift 3s linear infinite;
    }

    @keyframes splashPulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.12); }
    }

    @keyframes rainbowShift {
      0%   { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    @keyframes letterPop {
      0%   { transform: translate(-50%, -50%) scale(0);   opacity: 1; }
      15%  { transform: translate(-50%, -50%) scale(1.4); opacity: 1; }
      55%  { transform: translate(-50%, -50%) scale(1.0); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(0.7); opacity: 0; }
    }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>
  <div id="letters"></div>
  <div id="shapes"></div>
  <div id="splash">
    <div id="splash-emoji">🎹</div>
    <div id="splash-text">Touch anything!</div>
  </div>

  <script>
  'use strict';

  // ─── CONSTANTS ───────────────────────────────────────────────────────────────

  // Pentatonic scale: C D E G A, two octaves — always sounds harmonious when mashed
  const PENTA = [261.63, 293.66, 329.63, 392.00, 440.00,
                 523.25, 587.33, 659.25, 783.99, 880.00];

  const SYMBOLS = ['★','♥','●','▲','■','♦','✦','✿','☀','❄'];
  const SHAPE_CHARS = ['●', '■', '▲', '★', '♥'];
  const ALL_CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';

  const IGNORE_KEYS = new Set([
    'Shift','Control','Alt','Meta','CapsLock','Escape','Tab',
    'F1','F2','F3','F4','F5','F6','F7','F8','F9','F10','F11','F12',
    'NumLock','ScrollLock','Pause','Insert','PrintScreen'
  ]);

  // ─── STATE ───────────────────────────────────────────────────────────────────

  let audioCtx    = null;
  let W           = window.innerWidth;
  let H           = window.innerHeight;
  const dpr       = window.devicePixelRatio || 1;
  let particles   = [];
  let shapes      = [];
  const keyLastTime = {};
  let splashDismissed = false;

  // ─── CANVAS SETUP ────────────────────────────────────────────────────────────

  const canvas = document.getElementById('particles');
  const ctx    = canvas.getContext('2d');

  function resizeCanvas() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width  = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resizeCanvas();

  // ─── AUDIO ENGINE ────────────────────────────────────────────────────────────

  function unlockAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  function playTone(char) {
    if (!audioCtx) return;
    try {
      const isDigit = char >= '0' && char <= '9';
      const idx     = isDigit
        ? parseInt(char, 10)
        : Math.abs(char.charCodeAt(0) - 65) % 10;
      const freq = PENTA[idx] * (isDigit ? 2 : 1);

      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.type          = isDigit ? 'triangle' : 'sine';
      osc.frequency.value = freq;

      const t = audioCtx.currentTime;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.35, t + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      osc.start(t);
      osc.stop(t + 0.35);
    } catch (e) {
      // Silently ignore audio errors (e.g. context closed)
    }
  }

  // ─── PARTICLE SYSTEM ─────────────────────────────────────────────────────────

  function spawnParticles(x, y, count) {
    // Hard cap to prevent performance collapse
    if (particles.length > 180) {
      particles.splice(0, particles.length - 130);
    }
    const baseHue = Math.random() * 360;
    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 * i / count) + (Math.random() - 0.5) * 0.8;
      const speed = 2 + Math.random() * 7;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 1.5,
        alpha: 1,
        hue: (baseHue + i * 13) % 360,
        size: 3 + Math.random() * 5,
        square: Math.random() > 0.65
      });
    }
  }

  // ─── ANIMATION LOOP ──────────────────────────────────────────────────────────

  function loop() {
    ctx.clearRect(0, 0, W, H);

    // Update & draw particles
    const alive = [];
    for (const p of particles) {
      p.x  += p.vx;
      p.y  += p.vy;
      p.vy += 0.15;       // gravity
      p.alpha -= 0.018;
      if (p.alpha <= 0.01) continue;
      alive.push(p);

      ctx.globalAlpha = p.alpha;
      ctx.fillStyle   = 'hsl(' + p.hue + ',95%,60%)';
      if (p.square) {
        ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
      } else {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
    particles = alive;

    // Update bouncing shapes
    for (const s of shapes) {
      s.x += s.vx;
      s.y += s.vy;
      if (s.x - s.r < 0)  s.vx =  Math.abs(s.vx);
      if (s.x + s.r > W)  s.vx = -Math.abs(s.vx);
      if (s.y - s.r < 0)  s.vy =  Math.abs(s.vy);
      if (s.y + s.r > H)  s.vy = -Math.abs(s.vy);
      s.x = Math.max(s.r, Math.min(W - s.r, s.x));
      s.y = Math.max(s.r, Math.min(H - s.r, s.y));
      s.el.style.left = s.x + 'px';
      s.el.style.top  = s.y + 'px';
    }

    requestAnimationFrame(loop);
  }

  // ─── LETTER SPAWNER ──────────────────────────────────────────────────────────

  const letterContainer = document.getElementById('letters');

  function spawnLetter(char, x, y) {
    // Enforce cap — remove oldest elements first
    while (letterContainer.children.length >= 15) {
      letterContainer.removeChild(letterContainer.firstChild);
    }

    const el   = document.createElement('div');
    el.textContent = char;

    const size = 80 + Math.random() * 120;
    const hue  = Math.random() * 360;
    const px   = Math.max(size / 2 + 10, Math.min(W - size / 2 - 10, x));
    const py   = Math.max(size / 2 + 10, Math.min(H - size / 2 - 10, y));

    el.style.cssText =
      'position:absolute;' +
      'left:' + px + 'px;' +
      'top:'  + py + 'px;' +
      'font-size:' + size + 'px;' +
      'color:hsl(' + hue + ',95%,60%);' +
      'font-weight:900;' +
      'font-family:system-ui,sans-serif;' +
      'animation:letterPop 2.5s forwards;' +
      'text-shadow:' +
        '0 0 30px hsl(' + hue + ',100%,70%),' +
        '0 0 60px hsl(' + hue + ',100%,50%);' +
      'pointer-events:none;' +
      'user-select:none;' +
      'line-height:1;';

    letterContainer.appendChild(el);
    el.addEventListener('animationend', function() { el.remove(); }, { once: true });
  }

  // ─── BOUNCING SHAPES ─────────────────────────────────────────────────────────

  function initShapes() {
    const container = document.getElementById('shapes');
    for (let i = 0; i < 5; i++) {
      const el  = document.createElement('div');
      const r   = 25 + Math.random() * 25;
      const hue = (i * 72 + Math.random() * 36) % 360;

      el.textContent = SHAPE_CHARS[i % SHAPE_CHARS.length];
      el.style.cssText =
        'position:absolute;' +
        'font-size:' + (r * 2) + 'px;' +
        'color:hsl(' + hue + ',80%,60%);' +
        'opacity:0.3;' +
        'transform:translate(-50%,-50%);' +
        'pointer-events:none;' +
        'user-select:none;' +
        'line-height:1;';

      container.appendChild(el);

      const x     = r + Math.random() * (W - 2 * r);
      const y     = r + Math.random() * (H - 2 * r);
      const speed = 0.6 + Math.random() * 1.4;
      const angle = Math.random() * Math.PI * 2;

      shapes.push({
        el, r, x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed
      });

      el.style.left = x + 'px';
      el.style.top  = y + 'px';
    }
  }

  // ─── CORE INTERACTION ────────────────────────────────────────────────────────

  function interact(char, x, y, bigBurst) {
    unlockAudio();
    spawnLetter(char, x, y);
    playTone(char);
    spawnParticles(x, y, bigBurst ? 55 : 30);
  }

  function randomChar() {
    return ALL_CHARS[Math.floor(Math.random() * ALL_CHARS.length)];
  }

  function randomSymbol() {
    return SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
  }

  // ─── SPLASH DISMISS ──────────────────────────────────────────────────────────

  const splash = document.getElementById('splash');

  function dismissSplash() {
    if (splashDismissed) return;
    splashDismissed = true;
    unlockAudio();
    splash.style.opacity       = '0';
    splash.style.pointerEvents = 'none';
    setTimeout(function() { splash.style.display = 'none'; }, 700);
  }

  splash.addEventListener('click', dismissSplash, { once: true });
  splash.addEventListener('touchstart', function(e) {
    e.preventDefault();
    dismissSplash();
  }, { once: true, passive: false });

  // First keydown also dismisses
  document.addEventListener('keydown', function dismissOnKey() {
    dismissSplash();
    document.removeEventListener('keydown', dismissOnKey);
  });

  // ─── KEYBOARD EVENTS ─────────────────────────────────────────────────────────

  document.addEventListener('keydown', function(e) {
    // Ignore pure modifier keys and combos
    if (IGNORE_KEYS.has(e.key))        return;
    if (e.ctrlKey || e.metaKey || e.altKey) return;

    // Throttle held-key repeat to max ~5/sec
    const now = Date.now();
    if (keyLastTime[e.code] && now - keyLastTime[e.code] < 200) return;
    keyLastTime[e.code] = now;

    // Prevent browser navigation / scrolling
    if (['Space','Tab','ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.code)) {
      e.preventDefault();
    }

    // Spread letter positions around center so they don't all pile up
    const x = W / 2 + (Math.random() - 0.5) * W * 0.55;
    const y = H / 2 + (Math.random() - 0.5) * H * 0.55;

    const isBig = e.key === ' ' || e.key === 'Enter' || e.key === 'Backspace' || e.key === 'Delete';
    const char  = (isBig || e.key.length !== 1) ? randomSymbol() : e.key.toUpperCase();

    interact(char, x, y, isBig);
  });

  // ─── TOUCH EVENTS ────────────────────────────────────────────────────────────

  document.addEventListener('touchstart', function(e) {
    e.preventDefault(); // blocks scroll & zoom on iOS
    if (!splashDismissed) return; // splash handles its own touch
    for (let i = 0; i < e.changedTouches.length; i++) {
      const t = e.changedTouches[i];
      interact(randomChar(), t.clientX, t.clientY, false);
    }
  }, { passive: false });

  // ─── MOUSE CLICK (desktop fallback) ──────────────────────────────────────────

  document.addEventListener('click', function(e) {
    if (!splashDismissed) return;
    if (e.target === splash || splash.contains(e.target)) return;
    interact(randomChar(), e.clientX, e.clientY, false);
  });

  // ─── RESIZE & VISIBILITY ─────────────────────────────────────────────────────

  window.addEventListener('resize', resizeCanvas);

  document.addEventListener('visibilitychange', function() {
    if (!document.hidden && audioCtx && audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
  });

  // ─── STARTUP ─────────────────────────────────────────────────────────────────

  initShapes();
  loop();

  </script>
</body>
</html>

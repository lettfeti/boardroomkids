<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a14">
  <meta name="description" content="Give your kid the keyboard while you work. Colorful letters, sounds, and fireworks for little hands.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Boardroom Kids — Keyboard toy for little coworkers">
  <meta property="og:description" content="Give your kid the keyboard while you work. Colorful letters, sounds, and fireworks for little hands.">
  <meta property="og:url" content="https://boardroomkids.vercel.app">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Boardroom Kids — Keyboard toy for little coworkers">
  <meta name="twitter:description" content="Give your kid the keyboard while you work. Colorful letters, sounds, and fireworks for little hands.">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👶</text></svg>">
  <title>Boardroom Kids</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: #0a0a14;
      overflow: hidden;
      touch-action: none;
      overscroll-behavior: none;
      -webkit-touch-callout: none;
      user-select: none;
      -webkit-user-select: none;
    }

    #particles {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    #letters {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 2;
      overflow: hidden;
    }

    #shapes {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    /* ── SPLASH ─────────────────────────────────────── */
    #splash {
      position: fixed; inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      background: radial-gradient(ellipse at 50% 40%, #1a1030 0%, #0a0a14 70%);
      z-index: 10;
      cursor: pointer;
      transition: opacity 0.7s ease;
    }

    /* Logo mark */
    #splash-logo {
      width: min(38vmin, 220px);
      height: min(38vmin, 220px);
      margin-bottom: 4vmin;
      filter: drop-shadow(0 0 30px rgba(160,100,255,0.5))
              drop-shadow(0 0 60px rgba(80,60,200,0.3));
      animation: logoBob 3s ease-in-out infinite;
    }

    @keyframes logoBob {
      0%, 100% { transform: translateY(0)   rotate(-2deg); }
      50%       { transform: translateY(-8px) rotate(2deg); }
    }

    /* App name */
    #splash-title {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: clamp(2rem, 7vmin, 4.5rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 1.2vmin;
      background: linear-gradient(135deg, #c084fc 0%, #818cf8 40%, #38bdf8 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Tagline */
    #splash-tagline {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: clamp(0.95rem, 2.8vmin, 1.5rem);
      font-weight: 500;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.01em;
      margin-bottom: 7vmin;
    }

    /* Big CTA button */
    #splash-cta {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2vmin;
      animation: ctaPulse 2s ease-in-out infinite;
    }

    #splash-cta-btn {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: clamp(1.1rem, 3.5vmin, 2rem);
      font-weight: 800;
      letter-spacing: 0.03em;
      padding: 2.5vmin 7vmin;
      border-radius: 100px;
      border: none;
      background: linear-gradient(135deg, #a855f7, #6366f1, #0ea5e9);
      color: #fff;
      cursor: pointer;
      pointer-events: none; /* whole splash is the click target */
      box-shadow: 0 0 40px rgba(139,92,246,0.5), 0 0 80px rgba(99,102,241,0.3);
    }

    #splash-hint {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: clamp(0.75rem, 2vmin, 1rem);
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.05em;
    }

    @keyframes ctaPulse {
      0%, 100% { transform: scale(1);    opacity: 1;    }
      50%       { transform: scale(1.04); opacity: 0.9; }
    }

    /* Fullscreen nudge — shown after dismiss if not in fullscreen */
    #fs-nudge {
      position: fixed;
      bottom: max(24px, env(safe-area-inset-bottom, 24px));
      left: 50%;
      transform: translateX(-50%);
      z-index: 9;
      display: none;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: clamp(0.75rem, 2vmin, 0.95rem);
      font-weight: 600;
      color: rgba(255,255,255,0.55);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 100px;
      padding: 10px 20px;
      cursor: pointer;
      letter-spacing: 0.04em;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: opacity 1s ease;
      white-space: nowrap;
    }

    @keyframes letterPop {
      0%   { transform: translate(-50%, -50%) scale(0);   opacity: 1; }
      15%  { transform: translate(-50%, -50%) scale(1.4); opacity: 1; }
      55%  { transform: translate(-50%, -50%) scale(1.0); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(0.7); opacity: 0; }
    }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>
  <div id="letters"></div>
  <div id="shapes"></div>

  <!-- Full-screen splash -->
  <div id="splash">
    <!-- SVG logo: a cute little person sitting at a laptop, colorful and bold -->
    <svg id="splash-logo" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <!-- Glow rings -->
      <circle cx="100" cy="100" r="92" fill="none" stroke="url(#gRing1)" stroke-width="2" opacity="0.4"/>
      <circle cx="100" cy="100" r="80" fill="none" stroke="url(#gRing2)" stroke-width="1" opacity="0.25"/>

      <!-- Body blob / desk surface -->
      <ellipse cx="100" cy="148" rx="56" ry="14" fill="#312068" opacity="0.7"/>

      <!-- Laptop base -->
      <rect x="52" y="128" width="96" height="10" rx="4" fill="#4f46e5"/>
      <!-- Laptop screen -->
      <rect x="60" y="88" width="80" height="46" rx="6" fill="#1e1b4b"/>
      <rect x="64" y="92" width="72" height="38" rx="4" fill="#0f172a"/>
      <!-- Screen glow lines (keyboard toy running on screen) -->
      <rect x="70" y="98"  width="18" height="5" rx="2" fill="#a855f7" opacity="0.9"/>
      <rect x="94" y="98"  width="12" height="5" rx="2" fill="#38bdf8" opacity="0.9"/>
      <rect x="112" y="98" width="16" height="5" rx="2" fill="#f472b6" opacity="0.9"/>
      <rect x="70" y="108" width="10" height="5" rx="2" fill="#34d399" opacity="0.9"/>
      <rect x="86" y="108" width="22" height="5" rx="2" fill="#fbbf24" opacity="0.9"/>
      <rect x="114" y="108" width="14" height="5" rx="2" fill="#f87171" opacity="0.9"/>
      <rect x="70" y="118" width="58" height="4" rx="2" fill="#6366f1" opacity="0.5"/>

      <!-- Kid body -->
      <ellipse cx="100" cy="115" rx="20" ry="16" fill="#f9a8d4"/>
      <!-- Kid arms reaching to keyboard -->
      <path d="M80 118 Q68 122 64 130" stroke="#f9a8d4" stroke-width="7" stroke-linecap="round" fill="none"/>
      <path d="M120 118 Q132 122 136 130" stroke="#f9a8d4" stroke-width="7" stroke-linecap="round" fill="none"/>
      <!-- Hands on keyboard -->
      <circle cx="64" cy="131" r="5" fill="#fecdd3"/>
      <circle cx="136" cy="131" r="5" fill="#fecdd3"/>

      <!-- Head -->
      <circle cx="100" cy="90" r="21" fill="#fde68a"/>
      <!-- Hair -->
      <ellipse cx="100" cy="72" rx="18" ry="9" fill="#92400e"/>
      <ellipse cx="83"  cy="78" rx="7"  ry="10" fill="#92400e"/>
      <ellipse cx="117" cy="78" rx="7"  ry="10" fill="#92400e"/>
      <!-- Eyes -->
      <circle cx="92"  cy="89" r="3.5" fill="#1e1b4b"/>
      <circle cx="108" cy="89" r="3.5" fill="#1e1b4b"/>
      <circle cx="93"  cy="88" r="1.2" fill="#fff" opacity="0.8"/>
      <circle cx="109" cy="88" r="1.2" fill="#fff" opacity="0.8"/>
      <!-- Smile -->
      <path d="M92 96 Q100 103 108 96" stroke="#92400e" stroke-width="2.5" stroke-linecap="round" fill="none"/>

      <!-- Floating sparkles -->
      <g opacity="0.9">
        <text x="22"  y="55"  font-size="18" fill="#f472b6">★</text>
        <text x="155" y="48"  font-size="14" fill="#34d399">✦</text>
        <text x="30"  y="145" font-size="12" fill="#fbbf24">●</text>
        <text x="158" y="150" font-size="16" fill="#818cf8">★</text>
        <text x="10"  y="100" font-size="10" fill="#38bdf8">✦</text>
        <text x="170" y="100" font-size="10" fill="#f87171">●</text>
      </g>

      <defs>
        <linearGradient id="gRing1" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%"   stop-color="#a855f7"/>
          <stop offset="100%" stop-color="#38bdf8"/>
        </linearGradient>
        <linearGradient id="gRing2" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%"   stop-color="#6366f1"/>
          <stop offset="100%" stop-color="#f472b6"/>
        </linearGradient>
      </defs>
    </svg>

    <div id="splash-title">Boardroom Kids</div>
    <div id="splash-tagline">Your little coworker's keyboard</div>

    <div id="splash-cta">
      <div id="splash-cta-btn">⚡ Tap to Play</div>
      <div id="splash-hint">GOES FULLSCREEN</div>
    </div>
  </div>

  <!-- Subtle fullscreen nudge after dismiss (if fullscreen failed / not supported) -->
  <div id="fs-nudge">⛶ Tap for fullscreen</div>

  <script>
  'use strict';

  // ─── CONSTANTS ───────────────────────────────────────────────────────────────

  const PENTA = [261.63, 293.66, 329.63, 392.00, 440.00,
                 523.25, 587.33, 659.25, 783.99, 880.00];

  const SYMBOLS    = ['★','♥','●','▲','■','♦','✦','✿','☀','❄'];
  const SHAPE_CHARS = ['●', '■', '▲', '★', '♥'];
  const ALL_CHARS   = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';

  const IGNORE_KEYS = new Set([
    'Shift','Control','Alt','Meta','CapsLock','Escape','Tab',
    'F1','F2','F3','F4','F5','F6','F7','F8','F9','F10','F11','F12',
    'NumLock','ScrollLock','Pause','Insert','PrintScreen'
  ]);

  // ─── STATE ───────────────────────────────────────────────────────────────────

  let audioCtx         = null;
  let W                = window.innerWidth;
  let H                = window.innerHeight;
  const dpr            = window.devicePixelRatio || 1;
  let particles        = [];
  let shapes           = [];
  const keyLastTime    = {};
  let splashDismissed  = false;

  // ─── CANVAS SETUP ────────────────────────────────────────────────────────────

  const canvas = document.getElementById('particles');
  const ctx    = canvas.getContext('2d');

  function resizeCanvas() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width  = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resizeCanvas();

  // ─── FULLSCREEN ──────────────────────────────────────────────────────────────

  function isFullscreen() {
    return !!(
      document.fullscreenElement ||
      document.webkitFullscreenElement ||
      document.mozFullScreenElement
    );
  }

  function requestFullscreen() {
    const el = document.documentElement;
    try {
      if (el.requestFullscreen)       el.requestFullscreen({ navigationUI: 'hide' });
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      else if (el.mozRequestFullScreen)    el.mozRequestFullScreen();
    } catch (e) { /* not supported — graceful degradation */ }
  }

  const fsNudge = document.getElementById('fs-nudge');
  fsNudge.addEventListener('click', function() {
    requestFullscreen();
    fsNudge.style.opacity = '0';
    setTimeout(function() { fsNudge.style.display = 'none'; }, 1000);
  });

  document.addEventListener('fullscreenchange', function() {
    if (isFullscreen()) {
      fsNudge.style.display = 'none';
    }
  });

  // ─── AUDIO ENGINE ────────────────────────────────────────────────────────────

  function unlockAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  function playTone(char) {
    if (!audioCtx) return;
    try {
      const isDigit = char >= '0' && char <= '9';
      const idx     = isDigit
        ? parseInt(char, 10)
        : Math.abs(char.charCodeAt(0) - 65) % 10;
      const freq = PENTA[idx] * (isDigit ? 2 : 1);

      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.type            = isDigit ? 'triangle' : 'sine';
      osc.frequency.value = freq;

      const t = audioCtx.currentTime;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.35, t + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      osc.start(t);
      osc.stop(t + 0.35);
    } catch (e) { /* ignore audio errors */ }
  }

  // ─── PARTICLE SYSTEM ─────────────────────────────────────────────────────────

  function spawnParticles(x, y, count) {
    if (particles.length > 180) {
      particles.splice(0, particles.length - 130);
    }
    const baseHue = Math.random() * 360;
    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 * i / count) + (Math.random() - 0.5) * 0.8;
      const speed = 2 + Math.random() * 7;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 1.5,
        alpha: 1,
        hue:   (baseHue + i * 13) % 360,
        size:  3 + Math.random() * 5,
        square: Math.random() > 0.65
      });
    }
  }

  // ─── ANIMATION LOOP ──────────────────────────────────────────────────────────

  function loop() {
    ctx.clearRect(0, 0, W, H);

    const alive = [];
    for (const p of particles) {
      p.x    += p.vx;
      p.y    += p.vy;
      p.vy   += 0.15;
      p.alpha -= 0.018;
      if (p.alpha <= 0.01) continue;
      alive.push(p);

      ctx.globalAlpha = p.alpha;
      ctx.fillStyle   = 'hsl(' + p.hue + ',95%,60%)';
      if (p.square) {
        ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
      } else {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
    particles = alive;

    for (const s of shapes) {
      s.x += s.vx;
      s.y += s.vy;
      if (s.x - s.r < 0) s.vx =  Math.abs(s.vx);
      if (s.x + s.r > W) s.vx = -Math.abs(s.vx);
      if (s.y - s.r < 0) s.vy =  Math.abs(s.vy);
      if (s.y + s.r > H) s.vy = -Math.abs(s.vy);
      s.x = Math.max(s.r, Math.min(W - s.r, s.x));
      s.y = Math.max(s.r, Math.min(H - s.r, s.y));
      s.el.style.left = s.x + 'px';
      s.el.style.top  = s.y + 'px';
    }

    requestAnimationFrame(loop);
  }

  // ─── LETTER SPAWNER ──────────────────────────────────────────────────────────

  const letterContainer = document.getElementById('letters');

  function spawnLetter(char, x, y) {
    while (letterContainer.children.length >= 15) {
      letterContainer.removeChild(letterContainer.firstChild);
    }

    const el   = document.createElement('div');
    el.textContent = char;

    const size = 80 + Math.random() * 120;
    const hue  = Math.random() * 360;
    const px   = Math.max(size / 2 + 10, Math.min(W - size / 2 - 10, x));
    const py   = Math.max(size / 2 + 10, Math.min(H - size / 2 - 10, y));

    el.style.cssText =
      'position:absolute;' +
      'left:' + px + 'px;' +
      'top:'  + py + 'px;' +
      'font-size:' + size + 'px;' +
      'color:hsl(' + hue + ',95%,60%);' +
      'font-weight:900;' +
      'font-family:system-ui,sans-serif;' +
      'animation:letterPop 2.5s forwards;' +
      'text-shadow:' +
        '0 0 30px hsl(' + hue + ',100%,70%),' +
        '0 0 60px hsl(' + hue + ',100%,50%);' +
      'pointer-events:none;' +
      'user-select:none;' +
      'line-height:1;';

    letterContainer.appendChild(el);
    el.addEventListener('animationend', function() { el.remove(); }, { once: true });
  }

  // ─── BOUNCING SHAPES ─────────────────────────────────────────────────────────

  function initShapes() {
    const container = document.getElementById('shapes');
    for (let i = 0; i < 5; i++) {
      const el  = document.createElement('div');
      const r   = 25 + Math.random() * 25;
      const hue = (i * 72 + Math.random() * 36) % 360;

      el.textContent = SHAPE_CHARS[i % SHAPE_CHARS.length];
      el.style.cssText =
        'position:absolute;' +
        'font-size:' + (r * 2) + 'px;' +
        'color:hsl(' + hue + ',80%,60%);' +
        'opacity:0.3;' +
        'transform:translate(-50%,-50%);' +
        'pointer-events:none;' +
        'user-select:none;' +
        'line-height:1;';

      container.appendChild(el);

      const x     = r + Math.random() * (W - 2 * r);
      const y     = r + Math.random() * (H - 2 * r);
      const speed = 0.6 + Math.random() * 1.4;
      const angle = Math.random() * Math.PI * 2;

      shapes.push({
        el, r, x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed
      });

      el.style.left = x + 'px';
      el.style.top  = y + 'px';
    }
  }

  // ─── CORE INTERACTION ────────────────────────────────────────────────────────

  function interact(char, x, y, bigBurst) {
    unlockAudio();
    spawnLetter(char, x, y);
    playTone(char);
    spawnParticles(x, y, bigBurst ? 55 : 30);
  }

  function randomChar()   { return ALL_CHARS[Math.floor(Math.random() * ALL_CHARS.length)]; }
  function randomSymbol() { return SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)]; }

  // ─── SPLASH DISMISS ──────────────────────────────────────────────────────────

  const splash = document.getElementById('splash');

  function dismissSplash() {
    if (splashDismissed) return;
    splashDismissed = true;
    unlockAudio();

    // Request fullscreen on dismiss (must be inside user gesture)
    requestFullscreen();

    splash.style.opacity       = '0';
    splash.style.pointerEvents = 'none';
    setTimeout(function() {
      splash.style.display = 'none';
      // Show nudge only if fullscreen wasn't granted
      setTimeout(function() {
        if (!isFullscreen()) {
          fsNudge.style.display = 'block';
          // Auto-hide after 5 seconds
          setTimeout(function() {
            fsNudge.style.opacity = '0';
            setTimeout(function() { fsNudge.style.display = 'none'; }, 1000);
          }, 5000);
        }
      }, 800);
    }, 700);
  }

  splash.addEventListener('click', dismissSplash, { once: true });
  splash.addEventListener('touchstart', function(e) {
    e.preventDefault();
    dismissSplash();
  }, { once: true, passive: false });

  document.addEventListener('keydown', function dismissOnKey() {
    dismissSplash();
    document.removeEventListener('keydown', dismissOnKey);
  });

  // ─── KEYBOARD EVENTS ─────────────────────────────────────────────────────────

  document.addEventListener('keydown', function(e) {
    if (IGNORE_KEYS.has(e.key))              return;
    if (e.ctrlKey || e.metaKey || e.altKey)  return;

    const now = Date.now();
    if (keyLastTime[e.code] && now - keyLastTime[e.code] < 200) return;
    keyLastTime[e.code] = now;

    if (['Space','Tab','ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.code)) {
      e.preventDefault();
    }

    const x     = W / 2 + (Math.random() - 0.5) * W * 0.55;
    const y     = H / 2 + (Math.random() - 0.5) * H * 0.55;
    const isBig = e.key === ' ' || e.key === 'Enter' || e.key === 'Backspace' || e.key === 'Delete';
    const char  = (isBig || e.key.length !== 1) ? randomSymbol() : e.key.toUpperCase();

    interact(char, x, y, isBig);
  });

  // ─── TOUCH EVENTS ────────────────────────────────────────────────────────────

  document.addEventListener('touchstart', function(e) {
    e.preventDefault();
    if (!splashDismissed) return;
    for (let i = 0; i < e.changedTouches.length; i++) {
      const t = e.changedTouches[i];
      interact(randomChar(), t.clientX, t.clientY, false);
    }
  }, { passive: false });

  // ─── MOUSE CLICK (desktop fallback) ──────────────────────────────────────────

  document.addEventListener('click', function(e) {
    if (!splashDismissed) return;
    if (e.target === splash || splash.contains(e.target)) return;
    interact(randomChar(), e.clientX, e.clientY, false);
  });

  // ─── RESIZE & VISIBILITY ─────────────────────────────────────────────────────

  window.addEventListener('resize', resizeCanvas);

  document.addEventListener('visibilitychange', function() {
    if (!document.hidden && audioCtx && audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
  });

  // ─── STARTUP ─────────────────────────────────────────────────────────────────

  initShapes();
  loop();

  </script>
</body>
</html>
